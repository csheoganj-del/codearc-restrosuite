<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FC8019">
  <title>RestroSuite Tokens | Customer Display</title>
  <link rel="stylesheet" href="dashboard-styles.css?v=2.6">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    (function() {
      var user = sessionStorage.getItem('logged_in_user');
      var role = sessionStorage.getItem('logged_in_role');
      if (!user) {
        window.location.replace('login.html');
        return;
      }
      document.body.classList.add('role-' + (role || 'customer_display'));
      document.documentElement.classList.add('tokens-fullscreen');
    })();
  </script>
  <style>
    /* Tokens Fullscreen Styles */
    html.tokens-fullscreen body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F7F3EF;
    }
    html.tokens-fullscreen .sidebar,
    html.tokens-fullscreen .mobile-bottom-nav,
    html.tokens-fullscreen .header-container,
    html.tokens-fullscreen .tab-content:not(#tokens-tab) {
      display: none !important;
    }
    html.tokens-fullscreen #tokens-tab {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex !important;
      flex-direction: column;
      padding: 24px;
      background: #F7F3EF;
    }
    .exit-fullscreen-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #172033;
      border: 1px solid rgba(23, 32, 51, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .exit-fullscreen-btn:hover {
      background: rgba(252, 128, 25, 0.1);
    }
  </style>
</head>
<body>
  <button class="exit-fullscreen-btn" onclick="window.location.href='dashboard.html'">
    <i class="fas fa-times"></i> Exit Display
  </button>

  <!-- Inject dashboard content for Tokens -->
  <div id="dashboard-inject"></div>

  <script>
    // Load the dashboard and extract only the Tokens tab
    fetch('dashboard.html')
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        // Copy Tokens tab content
        const tokensTab = doc.getElementById('tokens-tab');
        if (tokensTab) {
          document.getElementById('dashboard-inject').innerHTML = tokensTab.outerHTML;
          document.getElementById('tokens-tab').classList.add('active');
        }

        // Copy necessary scripts
        const scripts = doc.querySelectorAll('script');
        scripts.forEach(script => {
          if (script.src && script.src.includes('dashboard')) {
            const newScript = document.createElement('script');
            newScript.src = script.src;
            document.body.appendChild(newScript);
          }
        });
      })
      .catch(err => {
        console.error('Failed to load dashboard:', err);
        window.location.href = 'dashboard.html';
      });
  </script>
</body>
</html>
