<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#172033">
    <title>Page Not Found - RestroSuite</title>
    <link rel="icon" href="images/restrosuite-mark.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #172033;
            --ink-soft: #344054;
            --muted: #667085;
            --paper: #fffdfa;
            --surface: #ffffff;
            --surface-soft: #f7f8fa;
            --brand: #f36f21;
            --brand-dark: #c94f0b;
            --accent: #4456d9;
            --success: #16845b;
            --border-color: #e5e7eb;
            --shadow-lg: 0 28px 80px rgba(23, 32, 51, 0.14);
            --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 10%, rgba(243, 111, 33, 0.11), transparent 27%),
                        radial-gradient(circle at 92% 12%, rgba(68, 86, 217, 0.10), transparent 24%),
                        var(--paper);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(80px, 20vw, 150px);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
            box-shadow: 0 10px 24px rgba(243, 111, 33, 0.20);
        }

        .btn-primary:hover {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(201, 79, 11, 0.24);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--ink);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--ink);
            transform: translateY(-2px);
        }

        .illustration {
            margin: 40px 0;
        }

        .illustration i {
            font-size: 80px;
            color: var(--brand);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="title">Page Not Found</h1>
        <p class="subtitle">The page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
        
        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="login.html" class="btn btn-secondary">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
        </div>
    </div>

    <script>
        // Optional: Track 404 errors for analytics
        console.log('404 error: Page not found');
    </script>
</body>
</html>
