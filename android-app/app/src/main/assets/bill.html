<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Receipt | RestroSuite</title>
  <!-- Plus Jakarta Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: #111827;
      --text: #f3f4f6;
      --text-soft: #9ca3af;
      --text-mute: #6b7280;
      --orange: #ff5e00;
      --orange-dim: rgba(255, 94, 0, 0.12);
      --stroke: #374151;
      --stroke-light: #4b5563;
      --paper: #ffffff;
      --paper-text: #111827;
      --paper-text-soft: #4b5563;
      --paper-text-mute: #8e94a0;
      --paper-stroke: #e5e7eb;
      --paper-stroke-dashed: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Header & Actions */
    .header-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 16px;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-action {
      background: var(--card-bg);
      border: 1px solid var(--stroke);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-action:hover {
      background: var(--stroke);
      border-color: var(--text-mute);
    }

    /* Receipt Paper */
    .receipt-container {
      width: 100%;
      max-width: 420px;
      background: var(--paper);
      color: var(--paper-text);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 5px 15px rgba(0, 0, 0, 0.2);
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }

    /* Premium jagged paper edges simulation */
    .receipt-container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(-135deg, var(--bg) 4px, transparent 0), linear-gradient(135deg, var(--bg) 4px, transparent 0);
      background-size: 8px 8px;
      background-position: top center;
    }

    .receipt-container::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(-45deg, var(--bg) 4px, transparent 0), linear-gradient(45deg, var(--bg) 4px, transparent 0);
      background-size: 8px 8px;
      background-position: bottom center;
    }

    /* Receipt Elements */
    .rcp-center {
      text-align: center;
      margin-bottom: 16px;
    }

    .rcp-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 26px;
      color: #000;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .rcp-sub {
      font-size: 12px;
      color: var(--paper-text-soft);
      line-height: 1.5;
      margin-bottom: 2px;
    }

    .rcp-hr {
      border: 0;
      border-top: 1px dashed var(--paper-stroke-dashed);
      margin: 16px 0;
    }

    .rcp-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--paper-text-soft);
      margin-bottom: 6px;
    }
    .rcp-meta span:first-child {
      font-weight: 600;
    }

    .rcp-line {
      display: flex;
      justify-content: space-between;
      font-size: 13.5px;
      color: var(--paper-text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .rcp-line span:first-child {
      padding-right: 12px;
    }
    
    .rcp-line span.q {
      font-weight: 700;
      color: var(--paper-text-soft);
    }

    .rcp-tot {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 800;
      color: #000;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--paper-text);
    }

    .rcp-foot {
      text-align: center;
      font-size: 11.5px;
      color: var(--paper-text-mute);
      line-height: 1.6;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    /* Loading state */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      color: var(--text-soft);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 94, 0, 0.1);
      border-radius: 50%;
      border-top-color: var(--orange);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: 40px 20px;
      color: #f87171;
    }
    .error-state i {
      font-size: 36px;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Print styling overrides */
    @media print {
      body {
        background-color: #fff;
        color: #000;
        padding: 0;
      }
      .header-bar, .footer-watermark {
        display: none !important;
      }
      .receipt-container {
        box-shadow: none !important;
        border: none !important;
        max-width: 100% !important;
        padding: 0 !important;
      }
      .receipt-container::before, .receipt-container::after {
        display: none !important;
      }
    }

    .footer-watermark {
      text-align: center;
      font-size: 11px;
      color: var(--text-mute);
      margin-top: auto;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="brand">
      <i class="fa-solid fa-utensils"></i> RestroSuite
    </div>
    <button class="btn-action" onclick="window.print()">
      <i class="fa-solid fa-print"></i> Print Receipt
    </button>
  </div>

  <div class="receipt-container" id="receipt-root">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Retrieving secure bill details...</p>
    </div>
  </div>

  <div class="footer-watermark">
    Secure digital bill powered by RestroSuite SaaS
  </div>

  <!-- Runtime Config Script -->
  <script src="/config.js"></script>
  <script>
    (async function() {
      const root = document.getElementById('receipt-root');

      function showError(msg) {
        root.innerHTML = `
          <div class="error-state">
            <i class="fa-solid fa-circle-exclamation"></i>
            <h3>Unable to Load Bill</h3>
            <p style="font-size:13px; color:var(--paper-text-soft); margin-top:8px;">${msg}</p>
          </div>
        `;
      }

      // Helper to format currency
      function formatAmount(amount, locale, currency) {
        const symbol = currency.match(/\(([^)]+)\)/)?.[1] || '₹';
        const formatted = Math.round(amount).toLocaleString(locale || 'en-IN');
        return `${symbol} ${formatted}`;
      }

      // Parse parameters
      const params = new URLSearchParams(window.location.search);
      const tenantSlug = params.get('slug');
      const billNo = params.get('no');

      if (!tenantSlug || !billNo) {
        showError("Invalid digital receipt URL. Missing outlet slug or bill number.");
        return;
      }

      try {
        // Await config load
        if (window.__configReady) {
          await window.__configReady;
        }

        const supabaseUrl = window.__SUPABASE_URL__;
        const supabaseKey = window.__SUPABASE_ANON_KEY__;
        const endpoint = window.CONFIG && window.CONFIG.functions && window.CONFIG.functions.tenantPublic;

        if (!supabaseUrl || !endpoint) {
          throw new Error("Application runtime configuration is missing.");
        }

        // Call Deno Edge Function tenant-public
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': supabaseKey
          },
          body: JSON.stringify({
            action: 'get_public_bill',
            tenant_slug: tenantSlug,
            bill_no: billNo
          })
        });

        const data = await res.json();
        if (!res.ok || data.error) {
          throw new Error(data.error || `HTTP ${res.status} returned by server.`);
        }

        const bill = data.bill;
        const profile = data.profile || {};
        const country = data.country || 'India';
        const locale = data.locale || 'en-IN';
        const currency = data.currency || 'INR (₹)';
        const symbol = currency.match(/\(([^)]+)\)/)?.[1] || '₹';

        const formatCurrency = (amt) => formatAmount(amt, locale, currency);

        // Build HTML
        let profileLines = '';
        if (profile.address) profileLines += `<div class="rcp-sub">${profile.address}</div>`;
        if (profile.phone) profileLines += `<div class="rcp-sub">Phone ${profile.phone}</div>`;
        if (profile.tax_registration_no) {
          const taxLabel = profile.tax_label || 'GST';
          profileLines += `<div class="rcp-sub">${taxLabel} No: ${profile.tax_registration_no}</div>`;
        }

        let itemsHTML = '';
        const items = Array.isArray(bill.items) ? bill.items : [];
        itemsHTML = items.map(i => {
          return `<div class="rcp-line"><span><span class="q">${i.qty}× </span>${i.name}</span><span>${formatCurrency(i.price * i.qty)}</span></div>`;
        }).join('');

        let taxHTML = '';
        if (bill.gst > 0) {
          const taxLabel = profile.tax_label || 'GST';
          if (taxLabel === 'GST') {
            const halfGst = Math.round(bill.gst / 2);
            taxHTML = `
              <div class="rcp-line"><span>CGST (2.5%)</span><span>${formatCurrency(halfGst)}</span></div>
              <div class="rcp-line"><span>SGST (2.5%)</span><span>${formatCurrency(bill.gst - halfGst)}</span></div>
            `;
          } else {
            taxHTML = `<div class="rcp-line"><span>${taxLabel}</span><span>${formatCurrency(bill.gst)}</span></div>`;
          }
        }

        let customerHTML = '';
        if (bill.customerName && bill.customerName !== 'Walk-in') {
          customerHTML += `<div class="rcp-meta"><span>Customer:</span><span>${bill.customerName}</span></div>`;
          if (bill.customerPhone) {
            customerHTML += `<div class="rcp-meta"><span>Phone:</span><span>${bill.customerPhone}</span></div>`;
          }
        }

        root.innerHTML = `
          <div class="rcp-center">
            <div class="rcp-logo">${profile.name || 'Outlet'}</div>
            ${profileLines || '<div class="rcp-sub">RestroSuite Restaurant</div>'}
          </div>
          <hr class="rcp-hr">
          <div class="rcp-meta"><span>${bill.no}</span><span>${bill.time || ''}</span></div>
          <div class="rcp-meta"><span>Table:</span><span>${bill.tableNumber || 'Walk-in'}</span></div>
          ${customerHTML}
          <hr class="rcp-hr">
          ${itemsHTML}
          <hr class="rcp-hr">
          <div class="rcp-line"><span>Subtotal</span><span>${formatCurrency(bill.subtotal)}</span></div>
          ${bill.discount ? `<div class="rcp-line"><span>Discount</span><span>- ${formatCurrency(bill.discount)}</span></div>` : ''}
          ${bill.serviceChargeAmount ? `<div class="rcp-line"><span>Service Charge (5%)</span><span>${formatCurrency(bill.serviceChargeAmount)}</span></div>` : ''}
          ${taxHTML}
          <div class="rcp-tot"><span>TOTAL</span><span>${formatCurrency(bill.total)}</span></div>
          <hr class="rcp-hr">
          <div class="rcp-line"><span class="q">${bill.paymentMethod || 'Cash'}</span><span>${formatCurrency(bill.total)}</span></div>
          <div class="rcp-foot">Thank you for dining with us!<br><b>Powered by RestroSuite</b></div>
        `;

        // Update page title
        document.title = `${profile.name || 'Receipt'} | Bill ${bill.no}`;

      } catch(e) {
        showError(e.message || "Failed to establish database connection. Please try again.");
      }
    })();
  </script>
</body>
</html>
