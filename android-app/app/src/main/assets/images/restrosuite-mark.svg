<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="RestroSuite logo mark">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#FF4F00"/>

  <!-- Fork (left) -->
  <g fill="white">
    <rect x="20" y="12" width="2.5" height="10" rx="1.25"/>
    <rect x="24" y="12" width="2.5" height="10" rx="1.25"/>
    <rect x="28" y="12" width="2.5" height="10" rx="1.25"/>
    <!-- Fork handle merged -->
    <path d="M20 21.5 C20 21.5 20.5 26 24.25 26 C28 26 28.5 21.5 28.5 21.5 L28.5 52 L20 52 Z" rx="1"/>
  </g>

  <!-- Knife (right) -->
  <g fill="white">
    <path d="M36 12 C36 12 44 18 44 26 L36 26 Z" opacity="0.9"/>
    <rect x="36" y="26" width="2.5" height="26" rx="1.25"/>
  </g>

  <!-- Small dot / steam accent above center -->
  <circle cx="32" cy="9" r="2" fill="white" opacity="0.5"/>
</svg>
